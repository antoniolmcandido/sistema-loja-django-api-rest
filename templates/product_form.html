{% extends 'base.html' %}

{% block title %}Formulário do Produto{% endblock %}

{% block content %}

<h1 class="text-center">
  {% if form.instance.pk %}
    Editar Produto
  {% else %}
    Criar Produto
  {% endif %}
</h1>
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Formulário</h3>
  <div>
    <a href="{% url 'category_create' %}" class="btn btn-primary">Adicionar Categoria</a>
    <a href="{% url 'supplier_create' %}" class="btn btn-primary">Adicionar Fornecedor</a>
  </div>
</div>

<form method="post" novalidate>
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">
    Salvar
  </button>
  <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
